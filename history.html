<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order History | FF Glory India V5</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="history-container">

<div class="history-header">

<h1>📜 Order History</h1>

<p>All Your Payment Requests</p>

</div>

<div class="history-card">

<table>

<thead>

<tr>

<th>Order ID</th>

<th>UTR</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="4">

No Orders Found

</td>

</tr>

</tbody>

</table>

</div>

<div class="history-buttons">

<button onclick="window.location.href='dashboard.html'">

🏠 Dashboard

</button>

<button onclick="window.location.href='payment.html'">

💳 New Payment

</button>

</div>
</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="index.html";
return;

}

const table=document.getElementById("historyTable");

table.innerHTML="";

const payments=await getDocs(collection(db,"payments"));

let found=false;

payments.forEach((doc)=>{

const data=doc.data();

if(data.email===user.email){

found=true;

table.innerHTML+=`

<tr>

<td>${doc.id}</td>

<td>${data.utr}</td>

<td>${data.status}</td>

<td>${new Date(data.time).toLocaleDateString()}</td>

</tr>

`;

}

});

if(!found){

table.innerHTML=`

<tr>

<td colspan="4">

No Orders Found

</td>

</tr>

`;

}

});

</script>

</body>
</html>
