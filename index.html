<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Glory India V5</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">

<div class="login-card">

<div class="logo-box">

<img src="assets/logo.png" class="logo" alt="FF Glory Logo">

<h1>FF Glory India</h1>

<p>Professional Guild Panel V5</p>

</div>

<div class="tab-box">

<button id="loginTab" class="active">
Login
</button>

<button id="signupTab">
Signup
</button>

</div>

<!-- LOGIN -->

<div id="loginPage">

<input
type="email"
id="loginEmail"
placeholder="Enter Email"
autocomplete="email">

<input
type="password"
id="loginPassword"
placeholder="Enter Password"
autocomplete="current-password">

<button id="loginBtn">
Login
</button>

</div>

<!-- SIGNUP -->

<div id="signupPage" style="display:none;">

<input
type="email"
id="signupEmail"
placeholder="Enter Email">

<input
type="password"
id="signupPassword"
placeholder="Create Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button id="signupBtn">
Create Account
</button>
<p>
Already have an account?
<a href="#" id="goLogin">Login</a>
</p>

</div>

</div>

</div>

<script>

const loginPage = document.getElementById("loginPage");
const signupPage = document.getElementById("signupPage");

const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");

loginTab.addEventListener("click", () => {

    loginPage.style.display = "block";
    signupPage.style.display = "none";

    loginTab.classList.add("active");
    signupTab.classList.remove("active");

});

signupTab.addEventListener("click", () => {

    loginPage.style.display = "none";
    signupPage.style.display = "block";

    signupTab.classList.add("active");
    loginTab.classList.remove("active");

});

document.getElementById("goLogin").addEventListener("click", (e) => {

    e.preventDefault();

    loginPage.style.display = "block";
    signupPage.style.display = "none";

    loginTab.classList.add("active");
    signupTab.classList.remove("active");

});

document.getElementById("loginBtn").addEventListener("click", () => {
    login();
});

document.getElementById("signupBtn").addEventListener("click", () => {

    const pass = document.getElementById("signupPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (pass !== confirm) {
        alert("Passwords do not match!");
        return;
    }

    signup();

});

</script>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
